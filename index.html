<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-THREAD // Futurewear Studio</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-neon: #00ffcc;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Ambient Background Glows */
        .glow-orb {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.1) 0%, transparent 70%);
            top: -10%;
            left: -10%;
            z-index: -1;
            pointer-events: none;
        }

        /* Navigation Grid */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 4%;
            border-bottom: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: #fff;
        }
        .logo span { color: var(--accent-neon); }

        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; letter-spacing: 1px;}
        .nav-links a:hover, .nav-links .active { color: var(--accent-neon); }

        .cart-trigger {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: #fff;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cart-trigger:hover { border-color: var(--accent-neon); background: rgba(0, 255, 204, 0.05); }

        /* Main Workspace Layout */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 4%;
        }

        /* Filter Controls */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }
        .filter-tags { display: flex; gap: 10px; }
        .tag-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
        }
        .tag-btn.active, .tag-btn:hover {
            background: var(--accent-neon);
            color: #000;
            border-color: var(--accent-neon);
            font-weight: 600;
        }

        /* Advanced Dynamic Product Showroom */
        .showroom-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .img-container {
            width: 100%;
            height: 320px;
            background: rgba(255,255,255,0.01);
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* SVG Procedural Apparel Generation */
        .apparel-graphic {
            width: 160px;
            height: 160px;
            fill: none;
            stroke: var(--text-main);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .product-card:hover .apparel-graphic {
            stroke: var(--accent-neon);
            transform: scale(1.05);
        }

        .details-wrapper { display: flex; flex-direction: column; gap: 10px; }
        .meta-category { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 2px; }
        .product-title { font-size: 1.25rem; font-weight: 700; }
        .price-tag { font-size: 1.1rem; color: var(--accent-neon); font-weight: 600; }

        /* Configuration Modules */
        .config-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .size-selector { display: flex; gap: 6px; }
        .size-chip {
            width: 28px;
            height: 28px;
            border: 1px solid var(--card-border);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
        }
        .size-chip:hover, .size-chip.active {
            border-color: #fff;
            background: rgba(255,255,255,0.1);
        }

        .color-palette { display: flex; gap: 6px; }
        .color-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .color-dot.active { border-color: #fff; }

        .buy-btn {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 0.8rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-top: auto;
        }
        .buy-btn:hover { background: var(--accent-neon); }

        /* Slide-Out Shopping Ledger Panel */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: #0d0d11;
            border-left: 1px solid var(--card-border);
            z-index: 200;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            box-shadow: -20px 0 40px rgba(0,0,0,0.5);
        }
        .cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .close-cart { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
        .cart-items-stack { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--card-border);
        }
        .checkout-btn {
            background: var(--accent-neon);
            color: #000;
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="glow-orb"></div>
    
    <nav>
        <div class="logo">NEO<span>THREAD</span></div>
        <ul class="nav-links">
            <li><a href="#" class="active">Showroom</a></li>
            <li><a href="#">Collections</a></li>
            <li><a href="#">Drop Archive</a></li>
        </ul>
        <button class="cart-trigger" onclick="toggleCart()">
            🛒 Bag (<span id="cart-counter">0</span>)
        </button>
    </nav>

    <div class="container">
        <div class="controls-row">
            <div class="filter-tags">
                <button class="tag-btn active" onclick="filterCategory('all', this)">All Items</button>
                <button class="tag-btn" onclick="filterCategory('outerwear', this)">Outerwear</button>
                <button class="tag-btn" onclick="filterCategory('tops', this)">Tops</button>
            </div>
            <div>
                <select id="theme-selector" onchange="switchAccent(this.value)" style="background:var(--card-bg); color:#fff; border:1px solid var(--card-border); padding:0.5rem; border-radius:6px;">
                    <option value="#00ffcc">Neon Cyan</option>
                    <option value="#ff007f">Cyber Pink</option>
                    <option value="#ffff00">Matrix Yellow</option>
                </select>
            </div>
        </div>

        <div class="showroom-grid" id="product-showroom"></div>
    </div>

    <div class="cart-sidebar" id="cart-panel">
        <div class="cart-header">
            <h2>Your Order Ledger</h2>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items-stack" id="ledger-items"></div>
        <div style="border-top:1px solid var(--card-border); padding-top:1rem;">
            <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                <span>Total Assessment:</span>
                <span id="ledger-total" style="color:var(--accent-neon); font-weight:700;">$0.00</span>
            </div>
            <button class="checkout-btn">Initialize Checkout Matrix</button>
        </div>
    </div>

    <script>
        // Complex Product Databank Schema
        const products = [
            { id: 1, title: 'Kinetik Shell Parka', price: 289.00, cat: 'outerwear', svg: '<path d="M40 20 L20 40 L35 140 L125 140 L140 40 Z M20 40 L60 60 L60 140 M140 40 L100 60 L100 140"/>' },
            { id: 2, title: 'Modular Tech Hoodie', price: 145.00, cat: 'outerwear', svg: '<path d="M50 30 L30 50 L40 140 L120 140 L130 50 Z M50 30 Q80 10 110 30 M65 60 L95 60 L80 90 Z"/>' },
            { id: 3, title: 'Scrypt Graphic Tee', price: 65.00, cat: 'tops', svg: '<path d="M40 30 L20 45 L35 60 L45 130 L115 130 L125 60 L140 45 Z"/>' },
            { id: 4, title: 'Asym Utility Vest', price: 195.00, cat: 'outerwear', svg: '<path d="M45 20 L35 50 L45 130 L115 130 L125 50 L115 20 Z M55 50 H75 V80 H55 Z M85 60 H105 V100 H85 Z"/>' }
        ];

        let activeCart = [];

        // Dynamic Showroom Rendering Engine
        function renderShowroom(items) {
            const container = document.getElementById('product-showroom');
            container.innerHTML = items.map(p => `
                <div class="product-card" data-category="${p.cat}">
                    <div class="img-container">
                        <svg class="apparel-graphic" viewBox="0 0 160 160">${p.svg}</svg>
                    </div>
                    <div class="details-wrapper">
                        <span class="meta-category">${p.cat}</span>
                        <h3 class="product-title">${p.title}</h3>
                        <span class="price-tag">$${p.price.toFixed(2)}</span>
                    </div>
                    <div class="config-options">
                        <div class="size-selector">
                            <div class="size-chip active" onclick="selectChip(this)">S</div>
                            <div class="size-chip" onclick="selectChip(this)">M</div>
                            <div class="size-chip" onclick="selectChip(this)">L</div>
                        </div>
                        <div class="color-palette">
                            <div class="color-dot active" style="background:#222;" onclick="selectChip(this)"></div>
                            <div class="color-dot" style="background:#555;" onclick="selectChip(this)"></div>
                        </div>
                    </div>
                    <button class="buy-btn" onclick="addToCart(${p.id})">Deploy to Bag</button>
                </div>
            `).join('');
        }

        // Functional State Managers
        function selectChip(el) {
            Array.from(el.parentNode.children).forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function filterCategory(cat, btn) {
            Array.from(document.querySelectorAll('.tag-btn')).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = cat === 'all' ? products : products.filter(p => p.cat === cat);
            renderShowroom(filtered);
        }

        function switchAccent(color) {
            document.documentElement.style.setProperty('--accent-neon', color);
        }

        function toggleCart() {
            document.getElementById('cart-panel').classList.toggle('open');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            activeCart.push(product);
            updateCartLedger();
        }

        function updateCartLedger() {
            document.getElementById('cart-counter').innerText = activeCart.length;
            const ledger = document.getElementById('ledger-items');
            
            if (activeCart.length === 0) {
                ledger.innerHTML = '<p style="color:var(--text-muted); text-align:center; margin-top:2rem;">Matrix Empty</p>';
            } else {
                ledger.innerHTML = activeCart.map((item, index) => `
                    <div class="cart-item">
                        <div>
                            <h4>${item.title}</h4>
                            <span style="color:var(--accent-neon); font-size:0.9rem;">$${item.price.toFixed(2)}</span>
                        </div>
                        <button onclick="removeItem(${index})" style="background:none; border:none; color:red; cursor:pointer;">Remove</button>
                    </div>
                `).join('');
            }
            
            const total = activeCart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('ledger-total').innerText = `$${total.toFixed(2)}`;
        }

        function removeItem(index) {
            activeCart.splice(index, 1);
            updateCartLedger();
        }

        // Initialize Display Matrix
        renderShowroom(products);
        updateCartLedger();
    </script>
</body>
</html>
