<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.2);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }

        .photo-container {
            width: 180px;
            height: 180px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            border: 5px solid #ff8fab;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: #ff477e;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        p {
            color: #6c757d;
            font-size: 1rem;
            line-height: 1.5;
        }

        .heart {
            color: #ff477e;
            font-size: 3rem;
            margin-top: 1.5rem;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="photo-container">
            <img src="gf.jpg" alt="My Girl">
        </div>
        <h1>For My Girl</h1>
        <p>You make every single day brighter just by being in it. ❤️</p>
        <div class="heart">❤️</div>
    </div>

</body>
</html>
